<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công – T1 SHOP</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background: #f7f7f7;
        }

        .box {
            background: white;
            width: 600px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .logo {
            width: 130px;
            margin-bottom: 20px;
        }

        h1 {
            color: #28a745;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 20px;
            margin-bottom: 30px;
            color: #333;
        }

        .truck {
            width: 200px;
            animation: moveTruck 3s infinite linear;
        }

        @keyframes moveTruck {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(700px); }
        }

        .btn-back {
            padding: 12px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            display: inline-block;
            margin-top: 25px;
        }

        .btn-back:hover {
            background: black;
        }
    </style>
</head>
<body>

    <div class="box">
        <img src="images/Logo.png" class="logo">

        <h1>🎉 Thanh toán thành công!</h1>
        <div class="desc">Đơn hàng của bạn đang được vận chuyển…</div>

        <img src="images/Xe chở hàng.png"
             class="truck">

        <br>

        <a href="product.html" class="btn-back">⬅ Tiếp tục mua hàng</a>
    </div>

</body>
</html>
