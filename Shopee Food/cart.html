<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="simple-header">
    <button><</button>
    <h2>Giỏ hàng</h2>
    <div style="width: 20px;"></div>
</div>
<div class="cart-items">
    <div class="cart-item">
        <img src="img/comopla.jpg">
        <div class="cart-details">
            <p>Cơm sườn trứng ốp la</p>
            <p>35.000đ</p>
        </div>
        <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
        </div>
    </div>
    <div class="cart-item">
        <img src="img/combi.jpg">
        <div class="cart-details">
            <p>Cơm tấm sườn</p>
            <p>45.000đ</p>
        </div>
        <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
        </div>
    </div>
</div>
<div class="price-summary">
    <p>Tổng tạm tính <span>80.000đ</span></p>
</div>
<div class="fixed-bottom-bar">
    <button class="checkout-btn">Thanh toán - 80.000đ</button>
</div>
<script src="script.js"></script>
</body>
</html>
