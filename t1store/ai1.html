<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chat với Shop T1</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f1f1f1;
        margin: 0;
        padding: 0;
    }

    .chat-container {
        width: 100%;
        max-width: 450px;
        margin: auto;
        background: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
        border-left: 1px solid #ccc;
        border-right: 1px solid #ccc;
        position: relative;
    }

    .header {
        background: #0084ff;
        color: white;
        padding: 15px;
        font-size: 20px;
        text-align: center;
        font-weight: bold;
        position: relative;
    }

    .close-btn {
        position: absolute;
        right: 10px;
        top: 10px;
        background: transparent;
        border: none;
        color: white;
        font-size: 22px;
        cursor: pointer;
    }
    .close-btn:hover {
        opacity: 0.7;
    }

    .messages {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        background: #e5ddd5;
    }

    .msg {
        display: flex;
        margin-bottom: 15px;
        align-items: flex-end;
    }

    .msg.ai {
        flex-direction: row;
    }

    .msg.ai .bubble {
        background: white;
        color: black;
    }

    .msg.user {
        flex-direction: row-reverse;
        text-align: right;
    }

    .msg.user .bubble {
        background: #0084ff;
        color: white;
    }

    .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin: 0 10px;
    }

    .bubble {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.4;
    }

    .input-area {
        display: flex;
        padding: 10px;
        background: #fff;
        border-top: 1px solid #ccc;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid #ccc;
        outline: none;
    }

    button {
        padding: 10px 15px;
        margin-left: 10px;
        border: none;
        border-radius: 20px;
        background: #0084ff;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        Chat với Shop T1
        <button class="close-btn" onclick="exitChat()">✕</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="inputText" placeholder="Nhập tin nhắn...">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    const messages = document.getElementById("messages");

    const aiAvatar = "images1/Avt.jpg";
    const userAvatar = "images1/User.png";

    window.onload = function() {
        addAI("Xin chào! Shop T1 có thể giúp gì cho bạn?");
    };

    function addAI(text) {
        messages.innerHTML += `
        <div class="msg ai">
            <img src="${aiAvatar}" class="avatar">
            <div class="bubble"><b>Shop T1</b><br>${text}</div>
        </div>`;
        messages.scrollTop = messages.scrollHeight;
    }

    function addUser(text) {
        messages.innerHTML += `
        <div class="msg user">
            <div class="bubble"><b>Khách hàng</b><br>${text}</div>
            <img src="${userAvatar}" class="avatar">
        </div>`;
        messages.scrollTop = messages.scrollHeight;
    }

    function sendMessage() {
        let text = document.getElementById("inputText").value.trim();
        if (text === "") return;

        addUser(text);
        document.getElementById("inputText").value = "";

        setTimeout(() => {
            addAI("Cảm ơn quý khách đã quan tâm đến sản phẩm, bạn vui lòng chờ một chút để shop có thể đưa ra câu trả lời sớm nhất cho bạn.");
        }, 600);
    }

    function exitChat() {
        window.history.back();
    }
</script>

</body>
</html>
